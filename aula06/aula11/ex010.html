<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETRAN</title>
</head>
<body>
    <h1>Sistema de Multas</h1>
   Velocidade do carro: <input type="number" name="txtvel" id="txtvel">Km/h 
   <input type="button" value="verificar " onclick="calcular()">
   <div id="res">

   </div>

   <script> // a tag script é usada para inserir código JavaScript em uma página HTML
    
    function calcular(){
        var txtv= document.querySelector('input#txtvel') // querySelector é um método que retorna o primeiro elemento que corresponde a um seletor CSS especificado
        var res = document.querySelector('div#res') 
        var vel = Number(txtv.value)
        res.innerHTML = `A velocidade do seu carro é <strong>${vel}Km/h</strong>`
        res.innerHTML += `<p>Dirija sempre usando cinto de segurança!</p>` // += é um operador de atribuição que adiciona o valor à variável existente
        if (vel > 60){
            res.innerHTML += `Você ultrapassou o limite de velocidade. <strong>Multa</strong> de R$${(vel-60)*5}`
        } else {
            res.innerHTML += `Velocidade dentro do permitido. Tenha um bom dia!`
        }
    }
   </script>
</body>
</html>
