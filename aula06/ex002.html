<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Programa</title>
    <style>
        body {
            background-color: #6103602d;
            text-align: center;
            text-shadow: 0px 5px 3px #00000041;
            font: normal 20pt "Arial", sans-serif;
        }
        h1{
            color:rgb(60, 2, 60)
        }
        p{
            color:rgb(108, 0, 85)
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1><!---COmentário em HTML-->
    <p>Já me livrei da maldição!</p>
    <script>
        var nome = window.prompt("Qual é o seu nome?");// pergunta algo com caixa de resposta 
        window.alert ('É um grande prazer em te conhecer, ' + nome,+ '!');// + é concatenação

    </script>
</body>
</html>
