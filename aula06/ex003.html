<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Programa</title>
    <style>
        body {
            background-color: #6103602d;
            text-align: center;
            text-shadow: 0px 5px 3px #00000041;
            font: normal 20pt "Arial", sans-serif;
        }
        h1{
            color:rgb(60, 2, 60)
        }
        p{
            color:rgb(108, 0, 85)
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1><!---COmentário em HTML-->
    <p>Já me livrei da maldição!</p>
    <script>
       var n1 = Number(window.prompt ('Digite um numero: '));
       var n2 = Number(window.prompt ('Digite outro número: '));
       var s = n1+n2 ;
       window.alert(`A soma entre ${n1} e ${n2} é igual a ${s}`);// + pode servir para adição e concatenação.
       //number + number para adição
       //string + string para concatenação
       //o prompt sempre recebe valor string, você precisa converter



    </script>
</body>
</html>
